workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Reset Android folder
        script: |
          rm -rf android
          flutter create --platforms=android --org com.subito_alert --project-name subito_alert .
      - name: Get packages
        script: flutter pub get
      - name: Build signed APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
